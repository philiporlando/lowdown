name: CI

# Validates every pull request (and pushes to main): lint, format, types,
# tests, Dockerfile lint, and an image build + smoke test.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.8.12"

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - name: ruff check
        run: uv run ruff check --output-format=github src tests
      - name: ruff format --check
        run: uv run ruff format --check src tests

  typecheck:
    name: mypy (static types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run mypy

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked
      - run: uv run python -m pytest -q

  docker:
    name: Docker (lint + build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: lowdown:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test (/healthz)
        run: |
          docker run -d --name lowdown-ci -e LD_RUN_COLLECTOR=false -p 8000:8000 lowdown:ci
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/healthz; then echo; echo "app healthy"; exit 0; fi
            sleep 2
          done
          echo "app did not become healthy"; docker logs lowdown-ci; exit 1
